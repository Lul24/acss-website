<html lang="en" dir="ltr">
<head>

  <!-- Favicon - Complete Set with Versioning -->
  <link rel="apple-touch-icon" sizes="180x180" href="assets/logo/apple-touch-icon.png?v=2">
  <link rel="icon" type="image/png" sizes="96x96" href="assets/logo/favicon-96x96.png?v=2">
  <link rel="icon" type="image/svg+xml" href="assets/logo/favicon.svg?v=2">
  <link rel="icon" href="assets/logo/favicon.ico?v=2" type="image/x-icon">
  <link rel="manifest" href="assets/logo/site.webmanifest?v=2">
  <meta name="apple-mobile-web-app-title" content="ACSS">
  <meta name="application-name" content="ACSS">
  <meta name="msapplication-TileColor" content="#0A4D8C">
  <meta name="theme-color" content="#ffffff">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css">
  
  <style>
    /* ── 404 PAGE STYLES ────────────────────────────────────── */
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 40%, var(--green) 100%);
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .error-page::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 50%;
      pointer-events: none;
    }

    .error-page::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 400px;
      height: 400px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 50%;
      pointer-events: none;
    }

    .error-container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      width: 100%;
      text-align: center;
      padding: 3rem 2rem;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-2xl, 24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    .error-code {
      font-family: var(--font-head);
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 800;
      line-height: 1;
      color: var(--gold);
      text-shadow: 0 4px 30px rgba(244, 180, 0, 0.2);
      margin-bottom: 0.5rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .error-icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 1rem;
    }

    .error-title {
      color: var(--white);
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .error-message {
      color: rgba(255, 255, 255, 0.75);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 2rem;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }

    .error-actions .btn {
      min-width: 160px;
      justify-content: center;
    }

    .error-search-form {
      display: flex;
      gap: 0.5rem;
      max-width: 400px;
      margin: 1.5rem auto 0;
    }

    .error-search-form input {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: var(--radius-md, 8px);
      background: rgba(255, 255, 255, 0.08);
      color: var(--white);
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .error-search-form input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .error-search-form input:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.12);
    }

    .error-search-form .btn {
      flex-shrink: 0;
    }

    .error-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.5rem;
      justify-content: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .error-links a {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
      transition: color 0.2s ease;
      text-decoration: none;
    }

    .error-links a:hover {
      color: var(--gold);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 576px) {
      .error-container {
        padding: 2rem 1.25rem;
      }

      .error-actions {
        flex-direction: column;
        align-items: center;
      }

      .error-actions .btn {
        width: 100%;
        min-width: unset;
      }

      .error-search-form {
        flex-direction: column;
      }

      .error-search-form .btn {
        width: 100%;
        justify-content: center;
      }

      .error-code {
        font-size: clamp(4rem, 12vw, 6rem);
      }
    }

    /* ── ANIMATION DELAYS ── */
    .error-container > * {
      animation: fadeInUp 0.8s ease forwards;
      opacity: 0;
    }

    .error-container > *:nth-child(1) { animation-delay: 0.1s; }
    .error-container > *:nth-child(2) { animation-delay: 0.2s; }
    .error-container > *:nth-child(3) { animation-delay: 0.3s; }
    .error-container > *:nth-child(4) { animation-delay: 0.4s; }
    .error-container > *:nth-child(5) { animation-delay: 0.5s; }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <!-- SKIP LINK -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <main id="main-content" class="error-page" role="main">
    <div class="error-container">
      <!-- Error Code -->
      <div class="error-code">404</div>

      <!-- Error Icon -->
      <span class="error-icon" aria-hidden="true">🔍</span>

      <!-- Title -->
      <h1 class="error-title">Page Not Found</h1>

      <!-- Message -->
      <p class="error-message">
        Oops! The page you're looking for doesn't exist or has been moved. 
        Let's get you back on track.
      </p>

      <!-- Action Buttons -->
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">
          <span aria-hidden="true">🏠</span> Back to Home
        </a>
        <a href="contact.html" class="btn btn-outline-white">
          <span aria-hidden="true">✉️</span> Contact Us
        </a>
      </div>

      <!-- Search Form (optional) -->
      <form class="error-search-form" role="search" action="search.html" method="get">
        <input type="search" placeholder="Search our site..." aria-label="Search" name="q">
        <button type="submit" class="btn btn-primary">Search</button>
      </form>

      <!-- Quick Links -->
      <nav class="error-links" aria-label="Quick navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="programs.html">Programs</a>
        <a href="impact.html">Impact</a>
        <a href="get-involved.html">Get Involved</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </main>

  <!-- Back to Top (hidden on 404 page) -->
  <button class="back-to-top" aria-label="Back to top" style="display:none;">↑</button>

  <!-- Cookie Banner -->
  <div class="cookie-banner" role="dialog" aria-label="Cookie consent">
    <div class="cookie-inner">
      <p>We use cookies to improve your experience. See our <a href="cookie-policy.html">Cookie Policy</a>.</p>
      <div class="cookie-actions">
        <button class="btn btn-sm cookie-decline">Decline</button>
        <button class="btn btn-primary btn-sm cookie-accept">Accept</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" aria-live="polite"></div>

  <!-- Scripts -->
  <script src="script.js"></script>
  <script>
    // Simple search function (if search.html doesn't exist yet)
    document.querySelector('.error-search-form')?.addEventListener('submit', function(e) {
      e.preventDefault();
      const query = this.querySelector('input[type="search"]').value.trim();
      if (query) {
        window.location.href = 'index.html?search=' + encodeURIComponent(query);
      }
    });
  </script>
</body>
</html>
